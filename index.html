<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tonynoh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #000000;
            --bg-secondary: #0a0a0a;
            --bg-tertiary: #111111;
            --bg-card: #0f0f0f;
            --accent-primary: #1a1a1a;
            --accent-secondary: #555555;
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --text-tertiary: #71717a;
            --border-primary: #1f1f23;
            --border-secondary: #333333;
            --glow-primary: #888888;
            --glow-secondary: #444444;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        .app-container.animate-in,
        #mute-btn.animate-in {
            opacity: 1;
        }

        .section {
            transition: transform 1s ease-out, opacity 1s ease-out;
        }

        #staffExperience {
            transition-delay: 0.4s;
        }

        #mute-btn {
            background: transparent;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10000;
            color: #fff;
            border: 3px solid #fff;
            border-radius: .5rem;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 8px;
            font-size: 18px;
            cursor: pointer;
            opacity: 0;
            transition: opacity .5s ease-out, transform 1s ease-out;
        }

        #bg-start-audio {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100000000;
            background: #000;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            transition: opacity 0.2s ease-in-out;
            cursor: pointer;
            font-size: 15.2px;
        }

        #bg-start-audio h1 {
            transition: opacity 0.05s ease-in-out;
            opacity: 1;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-size: clamp(2rem, 6vw, 3.5rem);
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #ffffff 0%, #888888 50%, #ffffff 100%);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: textGradient 2s linear infinite;
        }

        #bg-start-audio p {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #444;
            animation: blink 1.4s step-end infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
            overflow-y: hidden;
            line-height: 1.6;
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            display: flex;
            min-height: 100vh;
        }

        .app-container {
            display: flex;
            width: 100vw;
            min-height: 100vh;
            opacity: 0;
            transition: opacity .5s ease-out, transform 1s ease-out;
        }

        .left-panel {
            width: 280px;
            background: rgba(15, 15, 15, 0.8);
            border-right: 1px solid var(--border-primary);
            padding: 1.5rem 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: fixed;
            top: 50%;
            left: 100px;
            transform: translateY(-50%);
            height: auto;
            max-height: 80vh;
            overflow-y: auto;
            z-index: 100;
            border-radius: 16px;
            backdrop-filter: blur(10px);
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border-primary);
            transition-delay: 0.2s;
        }

        .panel-header {
            padding: 0 1.5rem 1rem 1.5rem;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .panel-header i {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .panel-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0 8px 8px 0;
            color: var(--text-secondary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .panel-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .panel-item.active {
            background: #1a1a1a;
            color: var(--text-primary);
            font-weight: 600;
            border-left: 4px solid #ffffff;
            padding-left: calc(1.5rem - 4px);
            box-shadow: 0 0 15px rgba(255,255,255,0.05);
        }

        .panel-item.active:hover { opacity: 0.9; }

        .main-content {
            flex-grow: 1;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-left: 200px;
        }

        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 2rem;
            backdrop-filter: blur(20px);
            position: relative;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            max-width: 1000px;
            margin: 0 auto 40px auto;
            width: 100%;
            min-height: auto;
            scroll-margin-top: 20px;
        }

        .section:last-child { margin-bottom: 0; }

        #profileBio {
            margin-bottom: 100px !important;
            transition-delay: 0.3s;
        }

        #profileName { margin-top: -0.3rem; }

        .section-header {
            justify-content: center;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .section-icon {
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .profile-wrapper {
            position: relative;
            display: inline-block;
            width: 150px;
            height: 150px;
        }

        .profile-border {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #222, #888, #222, #888);
            position: absolute;
            top: 0;
            left: 0;
            z-index: -1;
            animation: rotate 8s linear infinite;
        }

        .profile-image {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(150,150,150,0.25);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .profile-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .profile-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .bio-tabs {
            margin-top: 0.75rem;
        }

        .bio-tab {
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .bio-tab strong {
            color: var(--text-primary);
        }

        .bio-content {
            color: #888;
            font-size: 1rem;
            font-weight: 500;
            margin-top: 1.5rem;
            text-align: center;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            font-style: italic;
        }

        .staff-category {
            margin: 20px auto;
            max-width: 1000px;
        }

        .staff-category h3 {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
            padding-left: 0;
            color: var(--text-secondary);
        }

        .staff-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .server-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 1.5rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 120px;
            justify-content: center;
        }

        .server-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, #333, #888);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .server-card:hover::before { transform: scaleX(1); }

        .server-card:hover {
            border-color: var(--border-secondary);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .server-info h4 {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .server-role {
            background: rgba(255,255,255,0.05);
            color: #aaa;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.25rem;
        }

        .server-year {
            color: var(--text-tertiary);
            font-size: 0.8rem;
            margin-top: 0.1rem;
            margin-bottom: 0.3rem;
            line-height: 1;
        }

        .bio-staff-section {
            margin-top: 3rem;
            width: 100%;
        }

        .bio-links-section {
            margin-top: 3rem;
            width: 100%;
        }

        .bio-staff-title {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .bio-links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .bio-staff-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
            width: 100%;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes textGradient {
            0% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            background: repeating-linear-gradient(180deg,
                #111111 0%,
                #1a1a1a 20%,
                #333333 50%,
                #1a1a1a 80%,
                #111111 100%);
            background-size: 100% 300%;
            background-repeat: repeat-y;
            animation: backgroundFlow 12s linear infinite;
            opacity: 0.4;
        }

        @keyframes backgroundFlow {
            from { background-position: 0 0; }
            to { background-position: 0 300%; }
        }

        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 1000;
        }

        .scroll-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #333, #ffffff);
            width: 0%;
            transition: width 0.2s ease;
        }

        ::selection { background: #333; color: #ffffff; }

        @media (max-width: 1024px) {
            .left-panel { left: 20px; width: 290px; }
            .main-content { margin-left: 270px; }
        }

        @media (max-width: 768px) {
            .app-container { flex-direction: column; }
            .left-panel {
                width: 100%;
                height: auto;
                position: relative;
                top: 0; left: 0;
                transform: none;
                max-height: none;
                margin-bottom: 1rem;
                border-right: none;
                border-bottom: 1px solid var(--border-primary);
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
                padding: 1rem;
                border-radius: 0;
            }
            .panel-item {
                flex: 1 1 auto;
                max-width: 150px;
                justify-content: center;
                border-left: none;
                border-radius: 8px;
                padding-left: 1.5rem;
            }
            .panel-item.active { border-left: none; padding-left: 1.5rem; }
            .main-content { padding: 1rem; margin-left: 0; }
            .section { max-width: 100%; margin: 20px auto; min-height: auto; padding: 1.5rem; }
            .staff-grid { grid-template-columns: repeat(1, minmax(0, 1fr)); }
            .panel-header { display: none; }
            .bio-links-grid { grid-template-columns: 1fr; }
            .bio-staff-grid { grid-template-columns: 1fr; }
        }
        .network-card {
            height: auto !important;
            cursor: default !important;
            flex-direction: row !important;
            justify-content: space-between !important;
            align-items: center !important;
            text-align: left !important;
            padding: 1.2rem 1.5rem !important;
        }

        .network-arrow {
            font-size: 1.2rem;
            color: var(--text-tertiary);
            transition: transform 0.3s ease;
            flex-shrink: 0;
            margin-left: 12px;
        }

        .network-card:hover .network-arrow {
            transform: rotate(180deg);
            color: var(--text-primary);
        }

        .tier-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: #111;
            border: 1px solid var(--border-secondary);
            border-radius: 10px;
            overflow: hidden;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 50;
        }

        .network-card:hover ~ .tier-dropdown,
        .network-card:hover .tier-dropdown {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        /* keep dropdown visible when hovering it */
        div:has(.network-card:hover) .tier-dropdown,
        div:has(.tier-dropdown:hover) .tier-dropdown {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .tier-dropdown-item {
            display: block;
            padding: 10px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: background 0.15s, color 0.15s;
            border-bottom: 1px solid var(--border-primary);
        }

        .tier-dropdown-item:last-child { border-bottom: none; }

        .tier-dropdown-item:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
    </style>
</head>

<body>
    <div id="bg-start-audio">
        <h1>tonynoh</h1>
        <p>click anywhere</p>
    </div>

    <audio id="bg-music" loop autoplay>
        <source src="song.mp3" type="audio/mp3">
    </audio>

    <button id="mute-btn"><i class="fa-solid fa-volume-high"></i></button>

    <div class="scroll-progress">
        <div class="scroll-progress-bar"></div>
    </div>

    <div class="app-container">
        <aside class="left-panel">
            <div class="panel-header" style="justify-content:center;"><i class="fa-solid fa-list"></i></div>
            <div class="panel-item active" data-section="profileBio">
                <i class="fa-solid fa-user"></i>
                <span>Bio</span>
            </div>
            <div class="panel-item" data-section="staffExperience">
                <i class="fa-solid fa-briefcase"></i>
                <span>Staff Experience</span>
            </div>
        </aside>

        <div class="main-content">
            <section class="section" id="profileBio">
                <div class="section-header">
                    <div class="section-icon"><i class="fa-solid fa-user"></i></div>
                    <span>Bio</span>
                </div>
                <div class="hero-content">
                    <div class="profile-wrapper">
                        <div class="profile-border"></div>
                        <div class="profile-image">
                            <div class="profile-inner" id="profileAvatar">
                                <img src="avatar.jpg" alt="tonynoh" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fa-solid fa-user\' style=\'font-size:3rem;color:#444;\'></i>'">
                            </div>
                        </div>
                    </div>

                    <h1 id="profileName" style="
                        font-size: clamp(2.5rem, 5vw, 4rem);
                        font-weight: 900;
                        background: linear-gradient(90deg, #ffffff 0%, #888888 25%, #ffffff 50%, #888888 75%, #ffffff 100%);
                        background-size: 200% auto;
                        background-clip: text;
                        -webkit-background-clip: text;
                        -webkit-text-fill-color: transparent;
                        margin-bottom: 0;
                        letter-spacing: -0.02em;
                        animation: textGradient 1.5s linear infinite;
                        position: relative;
                        background-position: 0% 50%;
                    ">tonynoh</h1>

                    <p class="subtitle" style="margin-top:0.25rem;margin-bottom:0.25rem;font-size:1.25rem;color:var(--text-secondary);font-weight:500;">
                        <i class="fa-solid fa-desktop"></i> Screensharer
                    </p>

                    <div class="bio-tabs">
                        <div class="bio-tab"><strong>Age:</strong> 19 y/o</div>
                        <div class="bio-tab"><strong>Place:</strong> Rome, Italy</div>
                        <div class="bio-tab"><strong>Language:</strong> Italian</div>
                    </div>

                    <!-- Current Staff section -->
                    <div class="bio-staff-section">
                        <h3 class="bio-staff-title"><i class="fa-solid fa-user-clock"></i> CURRENT STAFF</h3>
                        <div class="staff-grid" id="currentlyGrid"></div>
                    </div>

                    <!-- LINKS section -->
                    <div class="bio-links-section">
                        <h3 class="bio-staff-title"><i class="fa-solid fa-link"></i> LINKS</h3>
                        <div class="bio-links-grid" id="linksGrid"></div>
                    </div>
                </div>
            </section>

            <section class="section" id="staffExperience">
                <div class="section-header">
                    <div class="section-icon"><i class="fa-solid fa-briefcase"></i></div>
                    <span>Staff Experience</span>
                </div>
                <!-- le staff exp vengono aggiunte via JS dal CONFIG -->
            </section>
        </div>
    </div>

    <script>
        const CONFIG = {
            links: [
                {
                    name: "YouTube",
                    role: "@tonynoh-07",
                    icon: "fa-brands fa-youtube",
                    color: "#FF0000",
                    link: "https://www.youtube.com/@tonynoh-07"
                },
                {
                    name: "GitHub",
                    role: "MeowTonynoh",
                    icon: "fa-brands fa-github",
                    color: "#ffffff",
                    link: "https://github.com/MeowTonynoh"
                },
                {
                    name: "Discord",
                    role: "tonyboy90_",
                    icon: "fa-brands fa-discord",
                    color: "#5865F2",
                    link: "https://discord.com/users/1141815380994707549"
                },
                {
                    name: "Spotify",
                    role: "tonynoh",
                    icon: "fa-brands fa-spotify",
                    color: "#1DB954",
                    link: "https://open.spotify.com/user/qhs78cjzz9jwo83umkwaqcluo?si=40833a4bb3f34db3"
                }
            ],
            currently: [
                {
                    serverName: "PVP Tiers Network",
                    role: "PVP TIERIST",
                    color: "#ffffff",
                    tiers: [
                        { name: "UHC Tierlist", link: "https://discord.gg/wh54JQ9k" },
                        { name: "Axe Tierlist", link: "https://discord.gg/xy2GdVESCj" },
                        { name: "Crystal Tierlist", link: "https://discord.gg/2Ra6FqTp7" },
                        { name: "Potion Tierlist", link: "https://discord.gg/SWTXgtvZQh" },
                        { name: "Sword Tierlist", link: "https://discord.gg/tiers" },
                        { name: "SMP Tierlist", link: "https://discord.gg/sbtuPJzcxW" },
                        { name: "Nethpot Tierlist", link: "https://discord.gg/cJshFSxey4" }
                    ]
                }
            ],
            staffExperience: [
                // Verranno aggiunti quando mandi i link Imgur
                // Esempio: { serverName: "NomeServer", role: "RUOLO", year: "2024", color: "#ffffff", imgurLink: "https://imgur.com/..." }
            ]
        };

        function hexToRgba(hex, alpha) {
            let c = hex.replace('#', '');
            if (c.length === 3) c = c.split('').map(x => x + x).join('');
            const bigint = parseInt(c, 16);
            const r = (bigint >> 16) & 255;
            const g = (bigint >> 8) & 255;
            const b = bigint & 255;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function createCard(container, item, clickUrl) {
            const card = document.createElement('div');
            card.className = 'server-card';
            if (clickUrl) card.addEventListener('click', () => window.open(clickUrl, '_blank'));

            const yearHtml = item.year ? `<div class="server-year">${item.year}</div>` : '';

            card.innerHTML = `
                <div class="server-info">
                    <h4>${item.icon ? `<i class="${item.icon}"></i>&nbsp;` : ''}${item.name || item.serverName}</h4>
                    ${yearHtml}
                    <div class="server-role">${item.role}</div>
                </div>`;

            if (item.color) {
                const roleEl = card.querySelector('.server-role');
                roleEl.style.background = hexToRgba(item.color, 0.1);
                roleEl.style.borderColor = hexToRgba(item.color, 0.2);
                roleEl.style.color = item.color;
            }
            container.appendChild(card);
        }

        function initLinks() {
            const grid = document.getElementById('linksGrid');
            CONFIG.links.forEach(item => createCard(grid, item, item.link));
        }

        function initCurrently() {
            const grid = document.getElementById('currentlyGrid');
            grid.style.gridTemplateColumns = '1fr';

            if (CONFIG.currently.length === 0) {
                grid.innerHTML = '<p style="color:var(--text-tertiary);font-size:13px;text-align:center;">nothing at the moment 🎧</p>';
                return;
            }

            CONFIG.currently.forEach(item => {
                const wrapper = document.createElement('div');
                wrapper.style.cssText = 'position:relative;';

                let tiersHtml = '';
                if (item.tiers && item.tiers.length) {
                    tiersHtml = `
                    <div class="tier-dropdown">
                        ${item.tiers.map(t => `
                            <a href="${t.link}" target="_blank" class="tier-dropdown-item">
                                <span style="color:var(--text-tertiary);margin-right:8px;">→</span>${t.name}
                            </a>`).join('')}
                    </div>`;
                }

                wrapper.innerHTML = `
                    <div class="server-card network-card">
                        <div class="server-info">
                            <h4><i class="fa-solid fa-shield-halved" style="margin-right:8px;font-size:0.9rem;"></i>${item.serverName}</h4>
                            <div class="server-role">${item.role}</div>
                        </div>
                        <span class="network-arrow">▾</span>
                        ${tiersHtml}
                    </div>`;

                if (item.color) {
                    const roleEl = wrapper.querySelector('.server-role');
                    roleEl.style.background = hexToRgba(item.color, 0.1);
                    roleEl.style.borderColor = hexToRgba(item.color, 0.2);
                    roleEl.style.color = item.color;
                }

                grid.appendChild(wrapper);
            });
        }

        function initStaffExperience() {
            const section = document.getElementById('staffExperience');
            if (CONFIG.staffExperience.length === 0) {
                const placeholder = document.createElement('div');
                placeholder.style.cssText = 'text-align:center;color:var(--text-tertiary);padding:2rem;';
                placeholder.innerHTML = '<i class="fa-solid fa-clock" style="font-size:2rem;margin-bottom:1rem;display:block;"></i>Staff experience coming soon...';
                section.appendChild(placeholder);
            } else {
                // Raggruppa per categoria se necessario
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'staff-category';
                const grid = document.createElement('div');
                grid.className = 'staff-grid';
                CONFIG.staffExperience.forEach(item => createCard(grid, item, item.imgurLink));
                categoryDiv.appendChild(grid);
                section.appendChild(categoryDiv);
            }
        }

        function highlightActiveSection() {
            const sections = document.querySelectorAll('.section');
            const navItems = document.querySelectorAll('.panel-item');
            const viewportMiddle = window.scrollY + (window.innerHeight / 2);

            let closestSection = sections[0];
            let minDistance = Math.abs(viewportMiddle - (sections[0].offsetTop + sections[0].offsetHeight / 2));

            sections.forEach(section => {
                const sectionMiddle = section.offsetTop + (section.offsetHeight / 2);
                const distance = Math.abs(viewportMiddle - sectionMiddle);
                if (distance < minDistance) {
                    minDistance = distance;
                    closestSection = section;
                }
            });

            navItems.forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('data-section') === closestSection.id) {
                    item.classList.add('active');
                }
            });

            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            document.querySelector('.scroll-progress-bar').style.width = scrolled + '%';
        }

        // Audio
        const bgMusic = document.getElementById('bg-music');
        const muteBtn = document.getElementById('mute-btn');
        const bgStartAudio = document.getElementById('bg-start-audio');
        const appContainer = document.querySelector('.app-container');

        bgMusic.volume = 1;

        function playBgAudio() {
            bgStartAudio.style.pointerEvents = 'none';
            bgStartAudio.style.opacity = '0';
            setTimeout(() => {
                document.body.style.overflowY = 'auto';
                appContainer.classList.add('animate-in');
                muteBtn.classList.add('animate-in');
            }, 100);
            bgMusic.play().catch(() => {});
        }

        muteBtn.addEventListener('click', () => {
            bgMusic.muted = !bgMusic.muted;
            muteBtn.innerHTML = bgMusic.muted
                ? '<i class="fa-solid fa-volume-xmark"></i>'
                : '<i class="fa-solid fa-volume-high"></i>';
        });

        document.addEventListener('click', playBgAudio, { once: true });

        document.addEventListener('DOMContentLoaded', () => {
            initLinks();
            initCurrently();
            initStaffExperience();

            document.querySelectorAll('.panel-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const sectionId = item.getAttribute('data-section');
                    if (sectionId === 'profileBio') {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        const target = document.getElementById(sectionId);
                        if (target) window.scrollTo({ top: target.offsetTop - 40, behavior: 'smooth' });
                    }
                });
            });

            window.addEventListener('scroll', highlightActiveSection);
            highlightActiveSection();
        });
    </script>

    <script>
        function ghostCursor(options) {
            let hasWrapperEl = options && options.element;
            let element = hasWrapperEl || document.body;
            const lifeSpan = options && options.lifeSpan || 40;
            let width = window.innerWidth;
            let height = window.innerHeight;
            let cursor = { x: width / 2, y: width / 2 };
            let particles = [];
            let canvas, context, animationFrame;
            let baseImage = new Image();
            baseImage.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAwAAAATCAYAAACk9eypAAAAAXNSR0IArs4c6QAAACBjSFJNAAB6JgAAgIQAAPoAAACA6AAAdTAAAOpgAAA6mAAAF3CculE8AAAAhGVYSWZNTQAqAAAACAAFARIAAwAAAAEAAQAAARoABQAAAAEAAABKARsABQAAAAEAAABSASgAAwAAAAEAAgAAh2kABAAAAAEAAABaAAAAAAAAAEgAAAABAAAASAAAAAEAA6ABAAMAAAABAAEAAKACAAQAAAABAAAADKADAAQAAAABAAAAEwAAAAAChpcNAAAACXBIWXMAAAsTAAALEwEAmpwYAAABWWlUWHRYTUw6Y29tLmFkb2JlLnhtcAAAAAAAPHg6eG1wbWV0YSB4bWxuczp4PSJhZG9iZTpuczptZXRhLyIgeDp4bXB0az0iWE1QIENvcmUgNS40LjAiPgogICA8cmRmOlJERiB4bWxuczpyZGY9Imh0dHA6Ly93d3cudzMub3JnLzE5OTkvMDIvMjItcmRmLXN5bnRheC1ucyMiPgogICAgICA8cmRmOkRlc2NyaXB0aW9uIHJkZjphYm91dD0iIgogICAgICAgICAgICB4bWxuczp0aWZmPSJodHRwOi8vbnMuYWRvYmUuY29tL3RpZmYvMS4wLyI+CiAgICAgICAgIDx0aWZmOk9yaWVudGF0aW9uPjE8L3RpZmY6T3JpZW50YXRpb24+CiAgICAgIDwvcmRmOkRlc2NyaXB0aW9uPgogICA8L3JkZjpSREY+CjwveDp4bXBtZXRhPgpMwidZAAABqElEQVQoFY3SPUvDQBgH8BREpRHExYiDgmLFl6WC+AYmWeyLg4i7buJX8DMpOujgyxGvUYeCgzhUQUSKKLUS0+ZyptXh8Z5Ti621ekPyJHl+uftfomhaf9Ei5JyxXKfynyEA6EYcLHpwyflT958GAQ7DTABNHd8EbtDbEH2BD5QEQmi2mM8P/Iq+A0SzszEg+3sPjDnDdVEtQKQbMUidHD3xVzf6A9UDEmEm+8h9KTqTVUjT+vB53aHrCbAPiceYq1dQI1Aqv4EhMll0jzv+Y0yiRgCnLRSYyDQHVoqUXe4uKL9l+L7GXC4vkMhE6eW/AOJs9k583ORDUyXMZ8F5SVHVVnllmPNKSFagAJ5DofaqGXw/gHBYg51dIldkmknY3tguv3jOtHR4+MqAzaraJXbEhqHhcQlwGSOi5pytVQHZLN5s0WNe8HPrLYlFsO20RPHkImxsbmHdLJFI76th7Z4SeuF53hTeFLvhRCJRCTKZKxgdnRDbW+iozFJbBMw14/ElwGYc0egMBMFzT21f5Rog33Z7dX02GBm7WV5ZfT5Nn5bE3zuCDe9UxdTpNvK+5AAAAABJRU5ErkJggg==";

            const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");

            function init() {
                if (prefersReducedMotion.matches) return false;
                canvas = document.createElement("canvas");
                context = canvas.getContext("2d");
                canvas.style.top = "0px";
                canvas.style.left = "0px";
                canvas.style.pointerEvents = "none";
                canvas.style.zIndex = "9999999999";
                canvas.style.position = "fixed";
                document.body.appendChild(canvas);
                canvas.width = width;
                canvas.height = height;
                bindEvents();
                loop();
            }

            function bindEvents() {
                element.addEventListener("mousemove", onMouseMove);
                window.addEventListener("resize", () => {
                    width = window.innerWidth;
                    height = window.innerHeight;
                    canvas.width = width;
                    canvas.height = height;
                });
            }

            function onMouseMove(e) {
                cursor.x = e.clientX;
                cursor.y = e.clientY;
                particles.push(new Particle(cursor.x, cursor.y, baseImage));
            }

            function updateParticles() {
                if (particles.length == 0) return;
                context.clearRect(0, 0, width, height);
                for (let i = 0; i < particles.length; i++) particles[i].update(context);
                for (let i = particles.length - 1; i >= 0; i--) {
                    if (particles[i].lifeSpan < 0) particles.splice(i, 1);
                }
                if (particles.length == 0) context.clearRect(0, 0, width, height);
            }

            function loop() {
                updateParticles();
                animationFrame = requestAnimationFrame(loop);
            }

            function Particle(x, y, image) {
                this.initialLifeSpan = lifeSpan;
                this.lifeSpan = lifeSpan;
                this.position = { x, y };
                this.image = image;
                this.update = function (context) {
                    this.lifeSpan--;
                    const opacity = Math.max(this.lifeSpan / this.initialLifeSpan, 0);
                    context.globalAlpha = opacity;
                    context.drawImage(this.image, this.position.x, this.position.y);
                };
            }

            init();
        }

        ghostCursor({});
    </script>
